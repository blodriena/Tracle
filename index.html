<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracle</title>

    <link rel="stylesheet" href="./css/nav.css" />
    <link rel="icon" type="image/png" href="/img/favicon (2).png" sizes="32x32" />
  </head>
  <body>
    

    
    <header class="site">
      <div class="bg">
        <div class="lines">
          <span class="vline vline--left" aria-hidden="true"></span>
          <span class="vline vline--right" aria-hidden="true"></span>
        </div>

        <nav class="nav container">
          <a class="brand" href="#">
            <span class="brand__mark" aria-hidden="true">
             
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L20 7v10l-8 5-8-5V7l8-5Z" stroke="currentColor" stroke-width="2"/>
                <path d="M12 7l5 3v6l-5 3-5-3v-6l5-3Z" stroke="currentColor" stroke-width="2" opacity=".65"/>
              </svg>
            </span>
            <span class="brand__text">Tracle</span>
          </a>

          <button class="nav__burger" type="button" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>

          <div class="nav__links" data-nav-links>
            <a href="#features">Features</a>
            <a href="#how">How It Work</a>
            <a href="#pricing">Pricing</a>
            <a href="#testimonials">Testimonials</a>
          </div>

          <a class="btn btn--ghost" href="#book">Book a Call</a>
        </nav>

        <main class="hero container">
          <div class="hero__inner">
            <h1 class="hero__title">
              Transform Data Into<br />
              Decisions <span class="hero__accent">With AI.</span>
            </h1>

            <p class="hero__subtitle">
              Unlock your business potential with smart tools that streamline workflows,
              boost productivity, and fuel rapid growth.
            </p>

            <div class="hero__actions">
              <a class="btn btn--primary" href="#get-started">
                <span>Get Started</span>
                <span class="btn__icon" aria-hidden="true">
                  
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </a>
            </div>
          </div>
        </main>
      </div>
    </header>

    <script src="./script.js"></script>
  </body>
</html>
